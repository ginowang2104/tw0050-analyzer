name: 台股0050成份股異動分析

on:
  # 每個交易日台灣時間 18:30 自動執行（UTC 10:30）
  schedule:
    - cron: '30 10 * * 1-5'

  # 也可在 GitHub 頁面手動觸發
  workflow_dispatch:

permissions:
  contents: write   # 需要寫入 docs/ 並推送

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安裝相依套件
        run: pip install -r requirements.txt

      - name: 🔍 執行分析
        run: python src/analyze.py

      - name: 📤 推送結果到 docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # 若沒有變更就跳過 commit（避免空 commit 報錯）
          git diff --staged --quiet || git commit -m "🔄 自動更新：$(date +'%Y-%m-%d %H:%M') UTC"
          git push
