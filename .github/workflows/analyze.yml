name: Analyze TW0050

on:
  schedule:
    # Weekdays 18:30 Asia/Taipei, 10:30 UTC.
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update 0050 components
        run: python src/update_0050_components.py
        continue-on-error: true

      - name: Run analysis
        run: python src/analyze.py

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 0050_component_paste.txt docs/
          git diff --staged --quiet || git commit -m "Update analysis $(date +'%Y-%m-%d %H:%M') UTC"
          git push
